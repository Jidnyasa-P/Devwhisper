name: Sync Labels from Linked Issue

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write
  issues: read

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Copy labels from linked issue to PR
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || "";
            const prNumber = context.payload.pull_request.number;

            // Match "Resolves #3", "Closes #3", "Fixes #3" etc.
            const match = prBody.match(/(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#(\d+)/i);

            if (!match) {
              console.log("No linked issue found in PR body.");
              return;
            }

            const issueNumber = parseInt(match[3], 10);

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const labels = issue.data.labels.map(l => (typeof l === "string" ? l : l.name));

            if (labels.length === 0) {
              console.log(`Issue #${issueNumber} has no labels to copy.`);
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: labels,
            });

            console.log(`Copied labels [${labels.join(", ")}] from issue #${issueNumber} to PR #${prNumber}`);
